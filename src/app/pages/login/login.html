<div class="auth-container">
  <section class="auth-card">
    <button class="btn-volver" (click)="volverInicio()">← Volver</button>

    <h1>Iniciar sesión</h1>
    <p>Entra a tu cuenta para continuar practicando.</p>

    <form (ngSubmit)="iniciarSesion()">
      <label>Email</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="tuemail@correo.com"
        required
      />

      <label>Contraseña</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="Tu contraseña"
        required
      />

      <button class="btn-principal" type="submit">
        Iniciar sesión
      </button>
    </form>

    <p class="cambio">
      ¿No tienes cuenta?
      <button (click)="irRegistro()">Regístrate</button>
    </p>
  </section>
</div>
