<div class="auth-container">
  <section class="auth-card">
    <button class="btn-volver" type="button" (click)="volverInicio()">← Volver</button>

    <div class="auth-logo">
      <span class="logo-icon">🎤</span>
    </div>

    <h1>Iniciar sesión</h1>
    <p class="descripcion">
      Entra a Karaoke Kava con tu cuenta de Google y continúa practicando tus canciones favoritas.
    </p>

    <button
      class="btn-google"
      type="button"
      (click)="loginGoogle()"
      [disabled]="cargando"
    >
      <span class="google-icon">G</span>
      <span>{{ cargando ? 'Redirigiendo...' : 'Continuar con Google' }}</span>
    </button>

    <p class="nota-login">
      Usamos Google para proteger tu acceso y evitar manejar contraseñas dentro de la aplicación.
    </p>
  </section>
</div>
