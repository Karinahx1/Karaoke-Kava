<div class="auth-container">
  <section class="auth-card">
    <button class="btn-volver" (click)="volverInicio()">← Volver</button>

    <div class="auth-logo">
      <span class="logo-icon">🎤</span>
    </div>

    <h1>Crear cuenta</h1>
    <p class="descripcion">Completa tus datos y continúa con Google para empezar a cantar.</p>
    @if (mensajeInfo) {
      <div class="info-banner">
        <span class="info-icon">ℹ️</span>
        <span>{{ mensajeInfo }}</span>
      </div>
    }
    
    <form (ngSubmit)="registrarse()">

      <div class="form-group">
        <label for="reg-nombre">Nombre</label>
        <input
          id="reg-nombre"
          type="text"
          name="nombre"
          [(ngModel)]="nombre"
          placeholder="Tu nombre"
          required
        />
      </div>

      <div class="form-group">
        <label for="reg-apellido">Apellido</label>
        <input
          id="reg-apellido"
          type="text"
          name="apellido"
          [(ngModel)]="apellido"
          placeholder="Tu apellido"
          required
        />
      </div>

      <div class="form-group">
        <label for="reg-documento">Número de documento</label>
        <input
          id="reg-documento"
          type="text"
          name="numDocumento"
          [(ngModel)]="numDocumento"
          placeholder="Tu número de documento"
          required
        />
      </div>

      <div class="form-group">
        <label for="reg-genero">Género</label>
        <div class="select-wrapper">
          <select id="reg-genero" name="idGenero" [(ngModel)]="idGenero">
            <option [value]="1">Femenino</option>
            <option [value]="2">Masculino</option>
            <option [value]="3">Otro</option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>

      <div class="form-group">
        <label for="reg-email">Correo electrónico</label>
        <input
          id="reg-email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Tu correo de Google"
          required
          [class.input-error]="errorEmail"
        />
        @if (errorEmail) {
          <span class="error-msg">{{ errorEmail }}</span>
        }
      </div>

      <button class="btn-google-register" type="submit" [disabled]="cargando">
        <span class="google-icon">G</span>
        <span>{{ cargando ? 'Verificando...' : 'Registrarse con Google' }}</span>
      </button>

    </form>

    <p class="cambio">
      ¿Ya tienes cuenta?
      <button (click)="irLogin()">Inicia sesión</button>
    </p>
  </section>
</div>
